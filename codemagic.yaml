workflows:
  ios-release:
    name: iOS Release
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - New_group   # Groupe Codemagic avec tes variables
      ios:
        automatic_code_signing:
          bundle_identifier: "com.snipermarketacademy.app"
          provisioning_profiles:
            com.snipermarketacademy.app: SniperMarketAcademy_AppStore_Final
    scripts:
      - name: Flutter clean
        script: flutter clean
      - name: Get dependencies
        script: flutter pub get
      - name: Build iOS IPA (sans signature locale)
        script: flutter build ipa --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/ipa/*.dSYM.zip
      - build/ios/ipa/*.app
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        key_content: $APP_STORE_CONNECT_PRIVATE_KEY
        submit_to_app_store: true   # ✅ envoi direct App Store
